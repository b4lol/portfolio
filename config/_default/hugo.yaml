# Core, language-independent site configuration.
# Split out of the former single config.yaml for modular config
# (see config/_default/languages.yaml, menus.*.yaml, params*.yaml, markup.yaml).
#
# If your site is in 'https', then make sure your base url isn't written using 'http' otherwise your sitemap would
# contain http (as opposeed to https) URLs. This would affect Google indexing of your URLs.
baseURL: "https://b4.lol"
title: b4lol
defaultContentLanguage: en
timeZone: Europe/Rome
theme: [WonderMod]

enableInlineShortcodes: false
enableRobotsTXT: true
enableGitInfo: false
buildDrafts: false
buildFuture: false
buildExpired: false
enableEmoji: true
disableHugoGeneratorInject: true
mainsections: ["posts"]

sitemap:
  changefreq: weekly
  priority: 0.5

minify:
  disableXML: true
  minifyOutput: true

mediaTypes:
  application/manifest+json:
    suffixes:
      - webmanifest
  application/opensearchdescription+xml:
    suffixes:
      - xml

outputFormats:
  llmstxt:
    mediaType: text/plain
    baseName: llms
    isPlainText: true
    notAlternative: true
  llmsfull:
    mediaType: text/plain
    baseName: llms-full
    isPlainText: true
    notAlternative: true
  manifest:
    mediaType: application/manifest+json
    baseName: site
    isPlainText: true
    notAlternative: true
  opensearch:
    mediaType: application/opensearchdescription+xml
    baseName: opensearch
    isPlainText: true
    notAlternative: true
  serviceworker:
    mediaType: text/javascript
    baseName: sw
    isPlainText: true
    notAlternative: true

services:
  instagram:
    disableInlineCSS: true
  x:
    disableInlineCSS: true
