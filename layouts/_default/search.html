{{- define "main" }}

<header class="page-header">
    <h1>{{ .Title }}&nbsp;
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
    </h1>
    {{- if .Description }}
    <div class="post-description">
        {{ .Description }}
    </div>
    {{- end }}
    {{- if not (.Param "hideMeta") }}
    <div class="post-meta">
        {{- partial "translation_list.html" . -}}
    </div>
    {{- end }}
</header>

<div id="searchbox">
    <input id="searchInput" autofocus placeholder="{{ .Params.placeholder | default (printf "%s ↵" (i18n "search_placeholder" | default "Search")) }}"
        aria-label="{{ i18n "search_placeholder" | default "search" }}" type="search" autocomplete="off" maxlength="64">
    <ul id="searchResults" aria-label="{{ i18n "search_placeholder" | default "search" }} results"></ul>
    <noscript>
        {{ i18n "search_no_js" | default "Enable JavaScript to use the search function." }}
    </noscript>
</div>

{{- end }}{{/* end main */}}
